name: Repolinter Self-Lint

on:
  push:
    branches: ["main", "develop"]
    paths-ignore:
      - "README.md"
      - "docs/**"
      - ".agent/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/**"
      - ".agent/**"
      - "LICENSE"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    uses: ./.github/workflows/repolinter.yml
    secrets: inherit
