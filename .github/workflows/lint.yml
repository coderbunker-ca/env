name: Lint

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"
      - ".agent/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/**"
      - ".agent/**"
      - "LICENSE"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Cache
        uses: coderbunker-ca/env/.github/actions/setup-nix-env@main

      - name: Run pre-commit
        run: nix develop --command pre-commit run --all-files
        env:
          # TODO: enable this when we have a proper CI setup for the secrets
          SKIP: validate-sops
