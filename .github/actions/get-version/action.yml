name: Get Project Version
description: Determines the project version from package.json with PR/Develop suffixes.

outputs:
  version:
    description: "The determined version string"
    value: ${{ steps.version.outputs.version }}

runs:
  using: "composite"
  steps:
    - name: Determine Version
      id: version
      shell: bash
      run: |
        if [ ! -f "package.json" ]; then
          echo "error: package.json not found in $(pwd)"
          echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        BASE_VERSION=$(jq -r .version package.json)
        if [ "$BASE_VERSION" == "null" ] || [ -z "$BASE_VERSION" ]; then
          echo "warning: version not found in package.json, defaulting to 0.0.0"
          BASE_VERSION="0.0.0"
        fi

        # Remove any existing pre-release suffixes for consistency
        CLEAN_VERSION=$(echo "$BASE_VERSION" | cut -d '-' -f 1)

        echo "version=$CLEAN_VERSION" >> "$GITHUB_OUTPUT"
        echo "Determined base version: $CLEAN_VERSION"
